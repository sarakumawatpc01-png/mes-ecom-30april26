# ============================================================
# TEMPLATE: Copy and rename to blackkurti.com.conf, etc.
# Replace SITEDOMAIN and SITESLUG with actual values
# ============================================================

server {
    listen 80;
    server_name SITEDOMAIN www.SITEDOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name SITEDOMAIN www.SITEDOMAIN;

    ssl_certificate     /etc/nginx/ssl/SITEDOMAIN/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/SITEDOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    root /var/www/sites/SITESLUG;
    index index.html;

    # Frontend static files
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600";
        add_header X-Site "SITESLUG";
    }

    # Static assets with long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://engine/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Site-Domain $host;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    # Checkout rate limiting
    location /api/orders/ {
        limit_req zone=checkout burst=5 nodelay;
        proxy_pass http://engine/api/orders/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Site-Domain $host;
    }

    # Auth rate limiting
    location /api/auth/ {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://engine/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Site-Domain $host;
    }

    # Google Shopping feed
    location = /shopping-feed.xml {
        proxy_pass http://engine/api/shopping-feed/SITESLUG;
        proxy_set_header Host $host;
    }

    # Sitemap
    location = /sitemap.xml {
        proxy_pass http://engine/api/sitemap/SITESLUG;
    }

    # Robots.txt
    location = /robots.txt {
        proxy_pass http://engine/api/robots/SITESLUG;
    }

    # ── Site Admin Panel at /admin ──────────────────────────
    # Each store's admin panel lives at example.com/admin
    # Login: set via superadmin panel (default: Admin@123)
    location /admin {
        proxy_pass http://admin_ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # Tell Next.js and Engine which site this admin belongs to
        proxy_set_header X-Admin-Context "site_admin";
        proxy_set_header X-Admin-Site "SITESLUG";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
    }

    # Engine admin API for site admin (scoped to this site)
    location /admin/api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://engine/admin/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Admin-Context "site_admin";
        proxy_set_header X-Admin-Site "SITESLUG";
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }

    # Stricter rate limit on site admin auth
    location /admin/api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://engine/admin/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Admin-Context "site_admin";
        proxy_set_header X-Admin-Site "SITESLUG";
    }

    # Security
    location ~ /\. { deny all; }
    location ~ \.env$ { deny all; }
}

# API subdomain (optional, for headless usage)
server {
    listen 443 ssl http2;
    server_name api.SITEDOMAIN;

    ssl_certificate     /etc/nginx/ssl/SITEDOMAIN/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/SITEDOMAIN/privkey.pem;

    location / {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://engine;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Site-Domain SITEDOMAIN;
    }
}
