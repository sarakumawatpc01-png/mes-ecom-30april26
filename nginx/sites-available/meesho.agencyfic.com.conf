# ============================================================
# SUPERADMIN PANEL — meesho.agencyfic.com
# This domain serves the superadmin (owner) dashboard only.
# Credentials: admin@agencyfic.com / Admin@123 (changeable)
# ============================================================

server {
    listen 80;
    server_name meesho.agencyfic.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name meesho.agencyfic.com;

    ssl_certificate     /etc/nginx/ssl/meesho.agencyfic.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/meesho.agencyfic.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Security headers (admin panel gets stricter CSP)
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.razorpay.com" always;

    # ── Admin UI (Next.js app) ──────────────────────────────
    location / {
        proxy_pass http://admin_ui;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # Tell Next.js this is the superadmin context
        proxy_set_header X-Admin-Context "superadmin";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    # ── Engine API for admin actions ────────────────────────
    location /admin/api/ {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://engine/admin/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # Mark as superadmin request so auth middleware can enforce role
        proxy_set_header X-Admin-Context "superadmin";
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
    }

    # ── Auth endpoint (stricter rate limit) ─────────────────
    location /admin/api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://engine/admin/api/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Admin-Context "superadmin";
    }

    # Block direct file access
    location ~ /\. { deny all; }
}
