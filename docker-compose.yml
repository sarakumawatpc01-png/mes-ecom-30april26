version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: meesho_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meesho_engine}
      POSTGRES_USER: ${POSTGRES_USER:-meesho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./engine/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meesho}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meesho_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: meesho_engine
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-meesho}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-meesho_engine}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - site_files:/app/sites
      - ./engine/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
    container_name: meesho_admin_ui
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_ENGINE_URL: http://engine:3001
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - engine

  nginx:
    image: nginx:alpine
    container_name: meesho_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-available:/etc/nginx/sites-available:ro
      - site_files:/var/www/sites:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - engine
      - admin-ui

volumes:
  postgres_data:
  redis_data:
  site_files:
  nginx_logs:

networks:
  default:
    name: meesho_network
